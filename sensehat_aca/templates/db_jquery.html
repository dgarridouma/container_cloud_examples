<head>
<title>Sample Application Azure App Service - Cosmos DB</title>
<link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.16/css/jquery.dataTables.min.css">
<script type="text/javascript" src="https://code.jquery.com/jquery-3.3.1.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/1.10.16/js/jquery.dataTables.min.js"></script>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="static/jquery.highchartTable.js" type="text/javascript"></script>
<script type="text/javascript" class="init">
    $(document).ready(function () {
        $('#mitabla')
            .DataTable(
                {
                    "paging": false,
                    "order": [],
                    language: {
                        search: "Buscar:",
                        "sInfo": "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ registros",
                        "sInfoEmpty": "Mostrando registros del 0 al 0 de un total de 0 registros",
                        "sInfoFiltered": "(filtrado de un total de _MAX_ registros)",
                        "sZeroRecords": "No se encontraron resultados",
                        "sEmptyTable": "Ningún dato disponible en esta tabla"
                    }
                });
        $('table.highchart').highchartTable();
    });
</script>
</head>
<body bgcolor=white>

<table border="0">
<tr>
<td>
<h1>Sample Application Azure App Service - Cosmos DB</h1>
This is the output of a Jinja template to show <b>Azure Cosmos DB</b>.
</td>
</tr>
</table>

<br/>
<table id="mitabla" class="display highchart" style="opacity:1;background-color:white"
		data-graph-container-before="1" data-graph-type="line">
		<caption>
			<strong>Temperature</strong>
		</caption>
		<thead>
			<tr>
				<th>Time</th>
				<th>Temperature</th>
			</tr>
		</thead>
        <tbody>

			{% for r in readings %}
			<tr>
				<td>{{ r['Body']['when'] }}</td>
				<td>{{ r['Body']['temperature'] }}</td>
			</tr>
			{% endfor %}
			<br />
        </tbody>
    </table>
<br/>
<p>Click <a href="/">here</a> to go back to the main page.</p>
</html>
